<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>体育祭 受付フォーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="view-page">
  <header class="view-header">
    <div class="title">
      <span class="main">体育祭 受付フォーム</span>
    </div>
  </header>

  <main class="view-main">
    <div id="alert-area"></div>

    <section class="view-card">
      <h2 class="view-card-title">受付</h2>
      <p class="view-card-desc" id="form-desc">以下を入力して送信してください。送信後、自動で待ち状況画面に移動します。</p>

      <!-- 保存済みの本人情報を表示 (?new=1 のとき) -->
      <div id="saved-identity-box" class="saved-identity-box" style="display:none">
        <div class="saved-identity-label">受付者</div>
        <div class="saved-identity-value">
          <span id="saved-name"></span>
          <span id="saved-sid" class="saved-identity-sid"></span>
        </div>
      </div>

      <form id="register-form" class="identity-form">
        <label id="label-name">
          <span>氏名 <span style="color:#ef4444">*</span></span>
          <input id="f-name" type="text" required autocomplete="name" placeholder="例: 山田 太郎">
        </label>
        <label id="label-sid">
          <span>学籍番号 <span style="color:#ef4444">*</span></span>
          <input id="f-sid" type="text" required autocomplete="off" placeholder="例: g000c0000">
        </label>
        <label>
          <span>種目 <span style="color:#ef4444">*</span></span>
          <div id="event-options" class="event-radio-group"></div>
        </label>

        <div id="form-error" class="form-error" style="display:none"></div>

        <button type="submit" class="btn-view-primary" id="submit-btn">受付する</button>
      </form>
    </section>

    <!-- 送信完了 (成功後に表示) -->
    <section id="success-section" class="view-card hidden">
      <div class="success-icon">✅</div>
      <h2 class="view-card-title" style="text-align:center">受付が完了しました</h2>
      <div id="success-info" class="success-info"></div>
      <p id="countdown-msg" class="view-card-desc" style="text-align:center; margin-top:12px"></p>
      <a id="success-link" href="view.html" class="btn-view-primary" style="display:block; text-align:center; text-decoration:none; margin-top:12px">今すぐ確認する</a>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    (function () {
      var $ = function (s) { return document.querySelector(s); };

      // 受付済みチェック: localStorage に識別情報があれば自動で view.html へ移動
      // (?new=1 で強制的にフォームを表示)
      var qs = new URLSearchParams(location.search);
      var forceNew = qs.get('new') === '1';
      if (!forceNew) {
        var saved = APP.Storage.getIdentity();
        if (saved && (saved.studentId || saved.name)) {
          var redirectUrl = 'view.html';
          var p = [];
          if (saved.studentId) p.push('sid=' + encodeURIComponent(saved.studentId));
          if (saved.name)      p.push('name=' + encodeURIComponent(saved.name));
          if (p.length) redirectUrl += '?' + p.join('&');
          location.replace(redirectUrl);
          return;
        }
      }

      var form = $('#register-form');
      var successSection = $('#success-section');
      var errorEl = $('#form-error');
      var submitBtn = $('#submit-btn');
      var eventOptions = $('#event-options');

      // ?new=1 で保存済みidentityがある場合: 種目選択のみのモード
      var savedForReuse = APP.Storage.getIdentity();
      var reuseMode = forceNew && savedForReuse && (savedForReuse.studentId || savedForReuse.name);
      if (reuseMode) {
        $('#form-desc').textContent = '別の種目を受付します。種目を選択して送信してください。';
        $('#label-name').style.display = 'none';
        $('#label-sid').style.display = 'none';
        $('#f-name').removeAttribute('required');
        $('#f-sid').removeAttribute('required');
        $('#saved-identity-box').style.display = 'block';
        $('#saved-name').textContent = savedForReuse.name || '';
        $('#saved-sid').textContent = savedForReuse.studentId ? '(' + savedForReuse.studentId + ')' : '';
      }

      // 種目選択肢をconfig.jsから生成
      var events = APP.config.events || [];
      eventOptions.innerHTML = events.map(function (ev, i) {
        return '<label class="event-radio">' +
          '<input type="radio" name="event" value="' + APP.escapeHtml(ev.name) + '"' + (i === 0 ? ' checked' : '') + '>' +
          '<span class="event-radio-label" style="--ev-color:' + ev.color + '">' + APP.escapeHtml(ev.name) + '</span>' +
        '</label>';
      }).join('');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      }
      function hideError() {
        errorEl.style.display = 'none';
      }

      if (!APP.Api.isConfigured()) {
        APP.renderConfigAlertIfNeeded('#alert-area');
        return;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var name, sid;
        if (reuseMode) {
          // 保存済みの値を使う (新規エントリーとして送信)
          name = (savedForReuse.name || '').trim();
          sid  = (savedForReuse.studentId || '').trim();
        } else {
          name = $('#f-name').value.trim();
          sid  = $('#f-sid').value.trim();
        }
        var eventRadio = document.querySelector('input[name="event"]:checked');
        var eventName = eventRadio ? eventRadio.value : '';

        if (!name) { showError('氏名情報が見つかりません'); return; }
        if (!sid) { showError('学籍番号情報が見つかりません'); return; }
        if (!eventName) { showError('種目を選択してください'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = '送信中…';

        APP.Api._call('register', { name: name, studentId: sid, event: eventName })
          .then(function (res) {
            // 成功
            form.parentElement.classList.add('hidden');
            successSection.classList.remove('hidden');

            var qNum = res.queueNumber || '?';
            $('#success-info').innerHTML =
              '<div class="success-detail"><strong>' + APP.escapeHtml(name) + '</strong> さん</div>' +
              '<div class="success-detail">種目: ' + APP.escapeHtml(eventName) + '</div>' +
              '<div class="success-num">あなたは <span class="success-big">No.' + APP.escapeHtml(qNum) + '</span> です</div>';

            // view.html へのリンクにパラメータ付与
            var viewUrl = 'view.html?sid=' + encodeURIComponent(sid) + '&name=' + encodeURIComponent(name);
            $('#success-link').href = viewUrl;

            // localStorageにも保存（view.htmlで使う）
            APP.Storage.setIdentity({ studentId: sid, name: name });

            // カウントダウン表示 + 自動遷移
            var remaining = 5;
            var countdownEl = $('#countdown-msg');
            countdownEl.textContent = remaining + '秒後に自動で順番確認画面に移動します';
            var countdownTimer = setInterval(function () {
              remaining--;
              if (remaining <= 0) {
                clearInterval(countdownTimer);
                location.href = viewUrl;
              } else {
                countdownEl.textContent = remaining + '秒後に自動で順番確認画面に移動します';
              }
            }, 1000);
          })
          .catch(function (err) {
            submitBtn.disabled = false;
            submitBtn.textContent = '受付する';
            showError('送信に失敗しました: ' + err.message);
          });
      });

      // 隠しコマンド: a を3回押すと admin へ
      APP.initHiddenAdminAccess();
    })();
  </script>
</body>
</html>
