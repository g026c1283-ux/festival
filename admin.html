<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>体育祭 順番待ち | 運営管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
  <header class="app-header">
    <div class="title">
      <span class="main">体育祭 順番待ち</span>
      <span class="sub">運営管理画面</span>
    </div>
    <span id="status" class="status-pill is-loading">読込中…</span>
    <div class="links">
      <a href="monitor.html">モニタ</a>
      <a href="admin.html" class="active">管理</a>
      <a href="qr.html">QR</a>
    </div>
  </header>

  <div class="admin-toolbar">
    <label>1人あたりの所要時間
      <input id="mpp" type="number" min="0.5" step="0.5" value="3"> 分
    </label>
    <div class="grow"></div>
    <span class="api-status" id="api-status"></span>
    <button class="btn-primary" id="refresh-btn">今すぐ更新</button>
  </div>

  <div id="alert-area"></div>

  <main id="admin-board" class="admin-grid"></main>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    (function () {
      const $ = function (s) { return document.querySelector(s); };
      const board = $('#admin-board');
      const statusEl = $('#status');
      const apiStatusEl = $('#api-status');
      const mppInput = $('#mpp');
      let busy = false;
      let watcher = null;

      mppInput.value = APP.Storage.getMinutesPerPerson();
      mppInput.addEventListener('change', function () {
        const v = parseFloat(mppInput.value);
        if (isFinite(v) && v > 0) {
          APP.Storage.setMinutesPerPerson(v);
          if (watcher) watcher.forceRefresh();
        }
      });

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = 'status-pill ' + (cls || '');
      }

      function statusLabel(s) {
        if (s === '呼出中')  return { txt: '呼出中', cls: 'calling' };
        if (s === '完了')    return { txt: '完了',   cls: 'done' };
        if (s === 'キャンセル') return { txt: 'キャンセル', cls: 'canceled' };
        return { txt: '待機中', cls: 'waiting' };
      }

      function rowClass(s) {
        if (s === '呼出中') return 'is-calling';
        if (s === '完了')   return 'is-done';
        if (s === 'キャンセル') return 'is-canceled';
        return '';
      }

      function renderCard(ev, bucket) {
        const all = bucket.all;
        const pending = all.filter(function (e) { return e.status !== '完了' && e.status !== 'キャンセル'; });

        const rowsHtml = all.length ? all.map(function (e) {
          const lab = statusLabel(e.status);
          const cls = rowClass(e.status);
          const isDone     = e.status === '完了';
          const isCanceled = e.status === 'キャンセル';
          const isCalling  = e.status === '呼出中';
          return '<tr class="' + cls + '" data-row="' + e.row + '">' +
            '<td class="pos">' + APP.escapeHtml(e.queueNumber) + '</td>' +
            '<td class="name">' + APP.escapeHtml(e.name || '(名前未登録)') + '</td>' +
            '<td class="id-cell">' + APP.escapeHtml(e.studentId || '') + '</td>' +
            '<td class="id-cell">' + APP.escapeHtml(e.email || '') + '</td>' +
            '<td><span class="status-cell ' + lab.cls + '">' + lab.txt + '</span></td>' +
            '<td class="actions">' +
              (!isDone && !isCanceled
                ? (isCalling
                    ? '<button class="btn btn-done" data-act="complete" data-row="' + e.row + '">完了</button>'
                    : '<button class="btn btn-call" data-act="call" data-row="' + e.row + '">呼出</button>'
                  )
                : '') +
              (!isDone && !isCanceled
                ? '<button class="btn btn-cancel" data-act="cancel" data-row="' + e.row + '">取消</button>'
                : '<button class="btn btn-reset" data-act="reset" data-row="' + e.row + '">戻す</button>'
              ) +
            '</td>' +
          '</tr>';
        }).join('') : '<tr><td class="empty-row" colspan="6">まだ受付がありません</td></tr>';

        return '' +
          '<section class="admin-card">' +
            '<div class="ev-header" style="background: linear-gradient(135deg, ' + ev.color + ' 0%, ' + ev.accent + ' 100%);">' +
              '<div class="ev-name">' + APP.escapeHtml(ev.name) + '</div>' +
              '<div class="ev-count">受付 ' + all.length + ' 名 / 待ち ' + pending.filter(function (e) { return e.status !== '呼出中'; }).length + ' 名</div>' +
            '</div>' +
            '<table class="queue-table">' +
              '<thead><tr><th>番号</th><th>氏名</th><th>学籍番号</th><th>メール</th><th>状態</th><th>操作</th></tr></thead>' +
              '<tbody>' + rowsHtml + '</tbody>' +
            '</table>' +
          '</section>';
      }

      function render(entries) {
        const queues = APP.buildQueues(entries);
        const html = (APP.config.events || []).map(function (ev) {
          const b = queues[ev.name] || { all: [], waiting: [], calling: null };
          return renderCard(ev, b);
        }).join('');
        board.innerHTML = html;
      }

      // 操作 (イベント委譲)
      board.addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-act]');
        if (!btn) return;
        const act = btn.dataset.act;
        const row = parseInt(btn.dataset.row, 10);
        if (!row) return;

        if ((act === 'cancel' || act === 'reset') && !confirm(act === 'cancel' ? 'この行をキャンセルしますか?' : 'この行を待機中に戻しますか?')) {
          return;
        }

        busy = true;
        btn.disabled = true;
        const fn = APP.Api[act];
        if (!fn) { busy = false; btn.disabled = false; return; }
        fn(row).then(function () {
          busy = false;
          if (watcher) watcher.forceRefresh();
        }).catch(function (err) {
          busy = false;
          btn.disabled = false;
          alert('操作に失敗しました: ' + err.message);
        });
      });

      $('#refresh-btn').addEventListener('click', function () {
        if (watcher) watcher.forceRefresh();
      });

      if (!APP.Api.isConfigured()) {
        APP.renderConfigAlertIfNeeded('#alert-area');
        setStatus('未設定', 'is-error');
        return;
      }

      watcher = APP.startWatcher({
        onChange: function (res) {
          render(res.entries || []);
          apiStatusEl.textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
        },
        onTick: function (info) {
          if (info.phase === 'start')         setStatus('確認中…', 'is-loading');
          else if (info.phase === 'changed')  setStatus('更新', '');
          else if (info.phase === 'unchanged') setStatus('接続中', '');
          else if (info.phase === 'error')     setStatus('接続エラー', 'is-error');
        }
      });
    })();
  </script>
</body>
</html>
